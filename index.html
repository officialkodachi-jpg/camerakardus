<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Label Kardus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
    h3 { margin-bottom: 15px; color: #333; }
    video { 
      border: 3px solid #28a745; 
      width: 100%; 
      max-width: 480px; 
      border-radius: 10px; 
      background-color: #222;
    }
    .btn { 
      display: inline-block;
      padding: 14px 28px; 
      font-size: 16px; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      margin: 8px 4px;
      font-weight: bold;
    }
    .btn-hijau { background: #28a745; color: white; }
    .btn-biru { background: #007bff; color: white; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    #status { 
      margin-top: 15px; 
      font-weight: bold; 
      color: #444; 
      padding: 12px;
      background: white;
      border-radius: 8px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    canvas { display: none; }
  </style>
</head>
<body>

  <h3>📦 Scan Label Kardus</h3>
  <video id="webcam" autoplay playsinline muted></video>
  <br>
  <button class="btn btn-hijau" id="btn-izin" onclick="aktifkanKamera()">🎥 Aktifkan Kamera</button>
  <button class="btn btn-biru" id="btn-scan" onclick="ambilFoto()" style="display:none;">📸 Ambil Foto & Scan</button>
  <div id="status">Klik "Aktifkan Kamera" untuk memulai.</div>
  <canvas id="canvas"></canvas>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_3-eoba2xh70FJPvFhxS1KfL2-HlRy6RSC2IvF4PIwq6gLq4pQFUCl5Pq8rn4oiBQ/exec";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const btnIzin = document.getElementById('btn-izin');
    const btnScan = document.getElementById('btn-scan');

    function aktifkanKamera() {
      btnIzin.disabled = true;
      statusDiv.innerHTML = "⏳ Meminta izin kamera...";

      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        } 
      })
      .then(function(stream) { 
        video.srcObject = stream;
        video.onloadedmetadata = function() {
          video.play();
          statusDiv.innerHTML = "✅ Kamera aktif. Arahkan ke label lalu klik Ambil Foto.";
          btnIzin.style.display = 'none';
          btnScan.style.display = 'inline-block';
        };
      })
      .catch(function(err) {
        btnIzin.disabled = false;
        if (err.name === 'NotAllowedError') {
          statusDiv.innerHTML = "❌ Izin kamera ditolak. Izinkan kamera di browser lalu refresh.";
        } else if (err.name === 'NotFoundError') {
          statusDiv.innerHTML = "❌ Kamera tidak ditemukan.";
        } else {
          statusDiv.innerHTML = "❌ Error: " + err.name + " - " + err.message;
        }
      });
    }

    function ambilFoto() {
      statusDiv.innerHTML = "⏳ Memproses gambar... Mohon tunggu.";
      btnScan.disabled = true;

      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const base64Data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

      if (!base64Data || base64Data.length < 100) {
        statusDiv.innerHTML = "❌ Gambar kosong. Coba refresh halaman.";
        btnScan.disabled = false;
        return;
      }

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ image: base64Data }),
        headers: { "Content-Type": "text/plain" }
      })
      .then(r => r.text())
      .then(res => {
        statusDiv.innerHTML = "✅ Berhasil! " + res;
        btnScan.disabled = false;
      })
      .catch(err => {
        statusDiv.innerHTML = "❌ Gagal kirim: " + err.message;
        btnScan.disabled = false;
      });
    }
  </script>
</body>
</html>
