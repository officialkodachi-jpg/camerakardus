<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Scan Gudang Terpadu</title>
  <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; text-align: center; padding: 15px; background: #f0f0f0; }
    h3 { margin-top: 10px; margin-bottom: 15px; color: #333; font-size: 18px; }
    
    #video-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 160px; /* 1/3 Layar */
      margin: 0 auto;
      overflow: hidden;
      border: 3px solid #28a745;
      border-radius: 12px;
      background: #222;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .garis-scan {
      display: none; 
      position: absolute; 
      top: 50%; 
      left: 0; 
      width: 100%; 
      height: 3px;
      background: #dc3545; 
      box-shadow: 0 0 8px #dc3545; 
      animation: naikTurun 1.5s infinite ease-in-out;
    }
    @keyframes naikTurun {
      0% { top: 15%; } 50% { top: 85%; } 100% { top: 15%; }
    }
    
    .bingkai-target {
      position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px dashed rgba(255, 255, 255, 0.4); border-radius: 6px; pointer-events: none;
    }

    .btn { display: inline-block; padding: 14px 10px; font-size: 15px; border: none; border-radius: 8px; cursor: pointer; margin: 8px 4px; font-weight: bold; width: 47%; }
    .btn-hijau { background: #28a745; color: white; width: 95%; margin-top: 10px; }
    .btn-biru { background: #007bff; color: white; }
    .btn-merah { background: #dc3545; color: white; }
    #grup-tombol { max-width: 400px; margin: 0 auto; }
    #status { margin-top: 15px; font-weight: bold; color: #444; padding: 12px; background: white; border-radius: 8px; max-width: 400px; margin: 15px auto; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    canvas { display: none; }
  </style>
</head>
<body>

  <div id="app">
    <h3>📦 Sistem Scan Gudang Terpadu</h3>
    
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <div class="garis-scan" id="garis-scan"></div>
      <div class="bingkai-target"></div>
    </div>
    
    <button class="btn btn-hijau" id="btn-izin" onclick="aktifkanKamera(false)">🎥 Nyalakan Kamera</button>
    
    <div id="grup-tombol" style="display:none;">
      <button class="btn btn-biru" id="btn-scan-teks" onclick="ambilFotoTeks()">📸 Scan Teks Label</button>
      <button class="btn btn-merah" id="btn-scan-barcode" onclick="mulaiScanBarcode()">🔍 Auto-Scan Barcode</button>
    </div>

    <div id="status">Klik "Nyalakan Kamera" untuk memulai.</div>
    <canvas id="canvas"></canvas>
  </div>

  <script>
    // =========================================================
    // WAJIB GANTI: Paste URL Exec / Deployment Apps Script di sini
    // =========================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzGNc8MtQ5PSlXl0NHQwlgKltYunlld77C1mor2q3RsnPoXTKLUtwdSaI7TY76ZdG6H/exec";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const garisScan = document.getElementById('garis-scan');
    let codeReader;

    // FITUR BARU: silentRestart (Merestart kamera tanpa mengubah teks loading di layar)
    function aktifkanKamera(silentRestart = false) {
      if (!silentRestart) statusDiv.innerHTML = "⏳ Meminta izin kamera...";
      
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }
      })
      .then(function(stream) {
        video.srcObject = stream;
        video.onloadedmetadata = function() {
          video.play();
          if (!silentRestart) {
            statusDiv.innerHTML = "✅ Kamera aktif. Posisikan tulisan label tepat di dalam kotak hijau.";
          }
          document.getElementById('btn-izin').style.display = 'none';
          document.getElementById('grup-tombol').style.display = 'block';
        };
      })
      .catch(function(err) {
        if (!silentRestart) statusDiv.innerHTML = "❌ Gagal akses kamera: " + err.message;
      });
    }

    // =========================================================
    // MODE 1: SCAN TEKS LABEL
    // =========================================================
    function ambilFotoTeks() {
      // 1. Tangkap gambar DULU selagi kamera masih menyala
      const ctx = canvas.getContext('2d');
      const vWidth = video.videoWidth || 640;
      const vHeight = video.videoHeight || 480;
      const tinggiPotongan = vHeight / 3; 
      const titikMulaiTop = (vHeight - tinggiPotongan) / 2;
      
      canvas.width = vWidth;
      canvas.height = tinggiPotongan;
      ctx.drawImage(video, 0, titikMulaiTop, vWidth, tinggiPotongan, 0, 0, vWidth, tinggiPotongan);
      const base64Data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

      // 2. Sekarang baru matikan Mesin Barcode (Ini akan bikin kamera mati)
      if (codeReader) { 
        codeReader.reset(); 
        codeReader = null; 
      }
      garisScan.style.display = 'none';
      
      // 3. Langsung nyalakan kamera lagi secara diam-diam (silent restart)
      aktifkanKamera(true); 

      // 4. Proses pengiriman data
      statusDiv.innerHTML = "⏳ Mengirim gambar & memproses teks... Mohon tunggu.";
      
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ image: base64Data }),
        headers: { "Content-Type": "text/plain" },
        mode: "no-cors"
      })
      .then(() => { 
        mainkanSuaraBeep(); // Bunyi Beep saat scan teks sukses
        statusDiv.innerHTML = "✅ Teks berhasil di-scan & masuk ke Sheets!"; 
      })
      .catch(err => { 
        statusDiv.innerHTML = "❌ Gagal kirim teks: " + err.message; 
      });
    }

    // =========================================================
    // MODE 2: AUTO-SCAN BARCODE / QR
    // =========================================================
    function mulaiScanBarcode() {
      statusDiv.innerHTML = "🔍 Mode Barcode Aktif! Tempelkan Barcode resi di garis merah.";
      garisScan.style.display = 'block';

      if (!codeReader) {
        codeReader = new ZXing.BrowserMultiFormatReader();
      }

      codeReader.decodeFromVideoDevice(null, 'webcam', (result, err) => {
        if (result) {
          // Matikan mesin pencari agar tidak double-scan
          codeReader.reset();
          codeReader = null;
          garisScan.style.display = 'none';
          
          // Nyalakan ulang kamera untuk standby
          aktifkanKamera(true);

          statusDiv.innerHTML = "⏳ Barcode terbaca: " + result.text + ". Mencatat...";
          mainkanSuaraBeep();

          fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ barcode: result.text }),
            headers: { "Content-Type": "text/plain" },
            mode: "no-cors"
          })
          .then(() => { 
            statusDiv.innerHTML = "✅ Barcode [" + result.text + "] sukses masuk spreadsheet!"; 
          })
          .catch(error => { 
            statusDiv.innerHTML = "❌ Gagal catat barcode: " + error.message; 
          });
        }
      });
    }

    // =========================================================
    // EFEK SUARA BEEP
    // =========================================================
    function mainkanSuaraBeep() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      oscillator.type = 'square';
      oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // Nada frekuensi tinggi
      oscillator.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.1); // Durasi Beep cepat (0.1 detik)
    }
  </script>
</body>
</html>
