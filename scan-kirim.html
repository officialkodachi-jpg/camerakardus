<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Status Kirim - Kolom L</title>
  <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; text-align: center; padding: 15px; background: #f4f6f9; }
    h3 { margin-top: 10px; margin-bottom: 5px; color: #333; font-size: 18px; }
    p.sub { color: #666; font-size: 13px; margin-bottom: 15px; }
    
    /* Ukuran bukaan kamera 1/3 layar HP */
    #video-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 160px;
      margin: 0 auto;
      overflow: hidden;
      border: 3px solid #007bff;
      border-radius: 12px;
      background: #222;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .garis-scan {
      position: absolute; top: 50%; left: 0; width: 100%; height: 3px;
      background: #dc3545; box-shadow: 0 0 8px #dc3545; 
      animation: naikTurun 1.5s infinite ease-in-out;
    }
    @keyframes naikTurun {
      0% { top: 15%; } 50% { top: 85%; } 100% { top: 15%; }
    }
    
    .btn { display: inline-block; padding: 14px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 95%; max-width: 400px; }
    .btn-biru { background: #007bff; color: white; }
    .btn-merah { background: #dc3545; color: white; }
    
    #status-box {
      margin-top: 15px; padding: 15px; border-radius: 8px; max-width: 400px; 
      margin-left: auto; margin-right: auto; font-size: 15px; font-weight: bold;
      background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: #444;
    }
    .sukses { background: #d4edda !important; color: #155724 !important; border: 1px solid #c3e6cb; }
    .peringatan { background: #fff3cd !important; color: #856404 !important; border: 1px solid #ffeeba; }
    .gagal { background: #f8d7da !important; color: #721c24 !important; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>

  <div id="app">
    <h3>📦 Scanner Status Kirim (Kolom L)</h3>
    <p class="sub">Tab: Paket | Target Pengisian: Kolom L ("Sudah")</p>
    
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <div class="garis-scan" id="garis-scan"></div>
    </div>
    
    <button class="btn btn-biru" id="btn-kontrol" onclick="mulaiScanner()">🎥 Aktifkan Scanner Kirim</button>
    
    <div id="status-box">Klik tombol di atas untuk mulai scan resi paket.</div>
  </div>

  <script>
    // =========================================================
    // PASTIKAN MASUKKAN LINK URL EXEC / DEPLOYMENT BARU DI SINI
    // =========================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzGNc8MtQ5PSlXl0NHQwlgKltYunlld77C1mor2q3RsnPoXTKLUtwdSaI7TY76ZdG6H/exec";

    const video = document.getElementById('webcam');
    const statusBox = document.getElementById('status-box');
    const btnKontrol = document.getElementById('btn-kontrol');
    const garisScan = document.getElementById('garis-scan');
    
    let codeReader = null;
    let sedangScanning = false;

    function mulaiScanner() {
      if (sedangScanning) {
        stopScanner();
        return;
      }

      statusBox.innerHTML = "⏳ Membuka kamera...";
      statusBox.className = "";
      
      if (!codeReader) {
        codeReader = new ZXing.BrowserMultiFormatReader();
      }

      codeReader.decodeFromVideoDevice(null, 'webcam', (result, err) => {
        if (result) {
          // Kunci sementara agar tidak menembak barcode yang sama berkali-kali
          codeReader.reset();
          garisScan.style.display = 'none';
          
          statusBox.innerHTML = "⏳ Resi terdeteksi: " + result.text + ". Memproses ke database...";
          statusBox.className = "";

          // Kirim data nomor resi ke Google Apps Script
          fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ resi: result.text }),
            headers: { "Content-Type": "text/plain" }
          })
          .then(response => response.text())
          .then(pesanServer => {
            // Analisis balasan server untuk efek suara & warna kotak status
            if (pesanServer.includes("✅")) {
              mainkanSuara(800, 0.1); // Beep pendek tinggi (Sukses)
              statusBox.className = "sukses";
            } else if (pesanServer.includes("⚠️")) {
              mainkanSuara(440, 0.15); setTimeout(() => mainkanSuara(440, 0.15), 200); // Beep dua kali (Duplikat)
              statusBox.className = "peringatan";
            } else {
              mainkanSuara(300, 0.4); // Beep rendah panjang (Gagal / Tidak ketemu)
              statusBox.className = "gagal";
            }
            statusBox.innerHTML = pesanServer;
            
            // Jeda 1.5 detik sebelum mengaktifkan kamera kembali (Standby scan berikutnya)
            setTimeout(() => {
              if (sedangScanning) aktifkanMataKamera();
            }, 1500);
          })
          .catch(error => {
            mainkanSuara(300, 0.4);
            statusBox.className = "gagal";
            statusBox.innerHTML = "❌ Koneksi Gagal: " + error.message;
            setTimeout(() => {
              if (sedangScanning) aktifkanMataKamera();
            }, 2000);
          });
        }
      });

      sedangScanning = true;
      garisScan.style.display = 'block';
      btnKontrol.innerHTML = "🛑 Hentikan Scanner";
      btnKontrol.className = "btn btn-merah";
      statusBox.innerHTML = "🔍 Scanner Aktif! Arahkan barcode resi ke kotak kamera.";
    }

    function aktifkanMataKamera() {
      garisScan.style.display = 'block';
      codeReader.decodeFromVideoDevice(null, 'webcam', (result, err) => {
        if (result) {
          codeReader.reset();
          garisScan.style.display = 'none';
          statusBox.innerHTML = "⏳ Resi terdeteksi: " + result.text + ". Memproses...";
          statusBox.className = "";
          
          fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ resi: result.text }),
            headers: { "Content-Type": "text/plain" }
          })
          .then(response => response.text())
          .then(pesanServer => {
            if (pesanServer.includes("✅")) {
              mainkanSuara(800, 0.1);
              statusBox.className = "sukses";
            } else if (pesanServer.includes("⚠️")) {
              mainkanSuara(440, 0.15); setTimeout(() => mainkanSuara(440, 0.15), 200);
              statusBox.className = "peringatan";
            } else {
              mainkanSuara(300, 0.4);
              statusBox.className = "gagal";
            }
            statusBox.innerHTML = pesanServer;
            setTimeout(() => { if (sedangScanning) aktifkanMataKamera(); }, 1500);
          })
          .catch(error => {
            mainkanSuara(300, 0.4);
            statusBox.className = "gagal";
            statusBox.innerHTML = "❌ Koneksi Gagal: " + error.message;
            setTimeout(() => { if (sedangScanning) aktifkanMataKamera(); }, 2000);
          });
        }
      });
    }

    function stopScanner() {
      sedangScanning = false;
      if (codeReader) {
        codeReader.reset();
      }
      garisScan.style.display = 'none';
      btnKontrol.innerHTML = "🎥 Aktifkan Scanner Kirim";
      btnKontrol.className = "btn btn-biru";
      statusBox.className = "";
      statusBox.innerHTML = "Scanner dihentikan.";
    }

    // Fungsi Audio Pembuat Variasi Bunyi Beep Sempoa Gudang
    function mainkanSuara(frekuensi, durasi) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(frekuensi, audioCtx.currentTime);
        oscillator.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + durasi);
      } catch (e) {
        console.log("Audio Error: " + e.message);
      }
    }
  </script>
</body>
</html>
