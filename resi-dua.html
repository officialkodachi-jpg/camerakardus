<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Packing</title>
  <link rel="manifest" href="#" id="manifest-link">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap');
    :root {
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#232342;
      --accent:#4f8aff;--green:#22c55e;--green-dim:#14532d;
      --red:#ef4444;--orange:#f97316;--orange-dim:#7c2d12;
      --yellow:#eab308;--yellow-dim:#713f12;
      --text:#e8e8f0;--muted:#8888aa;--border:#2a2a4a;
      --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .login-card{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 24px}
    .login-logo{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
    .login-title{font-size:22px;font-weight:600;margin-bottom:28px}
    .login-card input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:16px;color:var(--text);outline:none;margin-bottom:12px;font-family:var(--sans);transition:border-color .2s}
    .login-card input:focus{border-color:var(--accent)}
    .login-card input::placeholder{color:var(--muted)}
    .login-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans)}
    .login-btn:active{opacity:.8}
    .login-error{margin-top:12px;color:var(--red);font-size:13px;text-align:center}
    #app{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    .topbar-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
    .topbar-title{font-size:16px;font-weight:600;margin-top:2px}
    .counter-badge{text-align:right}
    .counter-num{font-family:var(--mono);font-size:28px;font-weight:600;color:var(--accent);line-height:1}
    .counter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
    .content{padding:16px 20px}
    .scanner-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;background:#000;border:1px solid var(--border);aspect-ratio:4/3;max-height:260px}
    #video{width:100%;height:100%;object-fit:cover;display:block}
    .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .scan-frame{width:180px;height:140px;border:2px solid var(--accent);border-radius:8px;position:relative}
    .scan-frame::before,.scan-frame::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--accent);border-style:solid}
    .scan-frame::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
    .scan-frame::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
    #scan-line{position:absolute;left:0;width:100%;height:2px;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:scanline 1.8s ease-in-out infinite;display:none}
    @keyframes scanline{0%,100%{top:10%}50%{top:88%}}
    .scanner-idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.6)}
    .scanner-idle-icon{font-size:40px;margin-bottom:8px}
    .scanner-idle-text{color:var(--muted);font-size:13px}
    .btn-row{display:flex;gap:10px;margin-top:14px}
    .btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn:active{opacity:.75;transform:scale(.97)}
    .btn-start{background:var(--accent);color:white}
    .btn-stop{background:var(--red);color:white;display:none}
    .btn-reset{flex:0 0 auto;width:50px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);font-size:18px}
    .status-box{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;min-height:64px;display:flex;align-items:center;font-size:14px;line-height:1.5;transition:border-color .15s,background .15s}
    .status-box.sukses{border-color:var(--green);background:var(--green-dim);color:#86efac}
    .status-box.batal{border-color:var(--orange);background:var(--orange-dim);color:#fdba74}
    .status-box.duplikat{border-color:var(--yellow);background:var(--yellow-dim);color:#fde68a}
    .status-box.proses{border-color:var(--yellow);background:var(--yellow-dim);color:#fde68a}
    .stats-row{display:flex;gap:10px;margin-top:14px}
    .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
    .stat-num{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text)}
    .stat-num.green{color:var(--green)}.stat-num.orange{color:var(--orange)}
    .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

    /* Queue indicator */
    .queue-indicator{display:none;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;margin-top:4px}
    .queue-indicator.active{display:block;color:var(--yellow)}

    .section-header{display:flex;justify-content:space-between;align-items:center;margin:20px 0 10px}
    .section-title{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
    .clear-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:4px 8px}
    .clear-btn:hover{color:var(--red)}
    #riwayat{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;padding-right:2px;padding-bottom:4px}
    #riwayat::-webkit-scrollbar{width:4px}
    #riwayat::-webkit-scrollbar-track{background:transparent}
    #riwayat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;padding:10px 12px;font-size:13px}
    .item.batal{border-left-color:var(--orange)}.item.duplikat{border-left-color:var(--yellow)}
    .item.pending{border-left-color:var(--muted);opacity:0.7}
    .item-icon{font-size:16px;flex-shrink:0}
    .item-resi{font-family:var(--mono);font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .item-time{font-size:11px;color:var(--muted);flex-shrink:0}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center;display:none}
    .modal-bg.open{display:flex}
    .modal{background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 24px 36px;width:100%;max-width:480px}
    .modal h3{font-size:16px;font-weight:600;margin-bottom:8px}
    .modal p{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
    .modal-actions{display:flex;gap:10px}
    .modal-cancel{flex:1;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}
    .modal-confirm{flex:1;padding:13px;background:var(--red);border:none;border-radius:10px;color:white;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e1e;border:1px solid var(--red);color:#fca5a5;font-size:13px;padding:12px 20px;border-radius:12px;z-index:200;opacity:0;transition:all .25s;max-width:90vw;text-align:center}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Scan System</div>
    <div class="login-title">📦 Packing</div>
    <input type="password" id="input-password" placeholder="Masukkan password"
           onkeydown="if(event.key==='Enter') cekPassword()">
    <button class="login-btn" onclick="cekPassword()">Masuk</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-label">Scan Mode</div>
      <div class="topbar-title">📦 Packing</div>
    </div>
    <div class="counter-badge">
      <div class="counter-num" id="total-count">0</div>
      <div class="counter-label">Total Scan</div>
    </div>
  </div>
  <div class="content">
    <div class="scanner-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div id="scan-line"></div>
      <div class="scan-overlay"><div class="scan-frame"></div></div>
      <div class="scanner-idle" id="scanner-idle">
        <div class="scanner-idle-icon">📷</div>
        <div class="scanner-idle-text">Kamera belum aktif</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="btn-mulai" onclick="mulaiScan()">▶ Mulai Scan</button>
      <button class="btn btn-stop"  id="btn-stop"  onclick="stopScan()">⏹ Stop</button>
      <button class="btn btn-reset" onclick="showResetModal()">↺</button>
    </div>
    <div id="queue-indicator" class="queue-indicator">⏳ Mengirim ke server…</div>
    <div class="status-box" id="status">Siap — tekan Mulai Scan.</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num green" id="count-sukses">0</div><div class="stat-label">Berhasil</div></div>
      <div class="stat-card"><div class="stat-num orange" id="count-batal">0</div><div class="stat-label">Batal</div></div>
      <div class="stat-card"><div class="stat-num" id="count-duplikat">0</div><div class="stat-label">Duplikat</div></div>
    </div>
    <div class="section-header">
      <div class="section-title">Riwayat</div>
      <button class="clear-btn" onclick="clearRiwayat()">Hapus riwayat</button>
    </div>
    <div id="riwayat"></div>
  </div>
</div>

<div class="modal-bg" id="modal-reset">
  <div class="modal">
    <h3>Reset Hitungan?</h3>
    <p>Semua hitungan dan riwayat akan dikosongkan. Data di Google Sheets tetap aman.</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="hideResetModal()">Batal</button>
      <button class="modal-confirm" onclick="resetSemua()">Reset</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
  const PASSWORD = "kodachi123";
  const GAS_URL  = "https://script.google.com/macros/s/AKfycbxomJnDBUB-1XZtnkc5asQdIn7tV742lv0MSGRD8zDH-TWRw3p873jbJIgHjncMty8/exec";
  const MODE     = "packing";
  const DB_NAME  = "ScanPackingDB";

  // ─────────────────────────────────────────────
  // WARMUP — panasin koneksi ke GAS sebelum scan
  // Kirim GET request agar GAS tidak cold start
  // ─────────────────────────────────────────────
  fetch(GAS_URL + "?ping=1").catch(() => {});

  // ─────────────────────────────────────────────
  // AUDIO
  // ─────────────────────────────────────────────
  let audioCtx;
  function inisialisasiAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    o.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.001);
  }
  function bunyi(tipe) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    if (tipe === "sukses") {
      o.type = "sine";
      o.frequency.setValueAtTime(1000, t);
      o.frequency.setValueAtTime(1400, t + 0.06);
      g.gain.setValueAtTime(0.4, t); g.gain.linearRampToValueAtTime(0, t + 0.12);
      o.start(t); o.stop(t + 0.12);
    } else if (tipe === "batal") {
      o.type = "square";
      o.frequency.setValueAtTime(300, t);
      g.gain.setValueAtTime(0.2, t); g.gain.linearRampToValueAtTime(0, t + 0.25);
      o.start(t); o.stop(t + 0.25);
    } else if (tipe === "duplikat") {
      o.type = "triangle";
      o.frequency.setValueAtTime(700, t);
      g.gain.setValueAtTime(0.2, t); g.gain.linearRampToValueAtTime(0, t + 0.15);
      o.start(t); o.stop(t + 0.15);
    } else { // nada netral saat baca barcode
      o.type = "sine";
      o.frequency.setValueAtTime(900, t);
      g.gain.setValueAtTime(0.15, t); g.gain.linearRampToValueAtTime(0, t + 0.06);
      o.start(t); o.stop(t + 0.06);
    }
  }

  // ─────────────────────────────────────────────
  // COUNTER
  // ─────────────────────────────────────────────
  let cntSukses = 0, cntBatal = 0, cntDuplikat = 0;
  const resiBatalUnik = new Set();

  function tampilStats() {
    document.getElementById("count-sukses").textContent   = cntSukses;
    document.getElementById("count-batal").textContent    = cntBatal;
    document.getElementById("count-duplikat").textContent = cntDuplikat;
    document.getElementById("total-count").textContent    = cntSukses + cntBatal + cntDuplikat;
  }

  // ─────────────────────────────────────────────
  // INDEXEDDB — hanya untuk riwayat tampilan
  // ─────────────────────────────────────────────
  let db;
  function initDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, 2);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (d.objectStoreNames.contains("scans")) d.deleteObjectStore("scans");
        const s = d.createObjectStore("scans", { keyPath: "id", autoIncrement: true });
        s.createIndex("ts", "ts", { unique: false });
      };
      req.onsuccess = e => { db = e.target.result; res(); };
      req.onerror   = () => rej(req.error);
    });
  }
  function dbWrite(data) { if (!db) return; db.transaction("scans","readwrite").objectStore("scans").add(data); }
  function dbClear() {
    return new Promise((res, rej) => {
      if (!db) return res();
      const r = db.transaction("scans","readwrite").objectStore("scans").clear();
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
  }
  function dbGetAll() {
    return new Promise((res, rej) => {
      if (!db) return res([]);
      const r = db.transaction("scans","readonly").objectStore("scans").getAll();
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  }

  async function initRiwayat() {
    const all    = await dbGetAll();
    const sorted = all.sort((a,b) => b.ts - a.ts).slice(0,30);
    sorted.forEach(s => tambahRiwayatDOM(s.resi, s.status, s.ts));
    all.forEach(s => { if (s.status === "batal") resiBatalUnik.add(s.resi); });
    all.forEach(s => {
      if (s.status === "sukses")        cntSukses++;
      else if (s.status === "duplikat") cntDuplikat++;
    });
    cntBatal = resiBatalUnik.size;
    tampilStats();
  }

  // ─────────────────────────────────────────────
  // SCAN QUEUE — kirim ke server tanpa blok UI
  // Satu item diproses per satu (tidak parallel)
  // agar urutan di sheet tetap benar
  // ─────────────────────────────────────────────
  const sendQueue = [];         // antrian item yang belum terkirim
  let queueRunning = false;     // flag apakah worker sedang jalan

  function enqueueScan(item) {
    sendQueue.push(item);
    updateQueueBadge();
    if (!queueRunning) runQueue();
  }

  async function runQueue() {
    if (queueRunning || sendQueue.length === 0) return;
    queueRunning = true;
    while (sendQueue.length > 0) {
      const item = sendQueue[0]; // peek — jangan hapus dulu
      const ok = await kirimKeServer(item);
      if (ok) {
        sendQueue.shift(); // hapus hanya setelah berhasil
      } else {
        // Gagal — tunggu 3 detik lalu coba lagi (tanpa hapus dari queue)
        await sleep(3000);
      }
      updateQueueBadge();
    }
    queueRunning = false;
  }

  function updateQueueBadge() {
    const el = document.getElementById("queue-indicator");
    if (sendQueue.length > 0) {
      el.className = "queue-indicator active";
      el.textContent = "⏳ Mengirim ke server… (" + sendQueue.length + " antri)";
    } else {
      el.className = "queue-indicator";
    }
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ─────────────────────────────────────────────
  // KIRIM KE SERVER — return true jika sukses
  // ─────────────────────────────────────────────
  async function kirimKeServer(item) {
    try {
      // PENTING: GAS pakai redirect (302) saat POST
      // keepalive:true tidak bisa follow redirect → request gagal diam-diam
      // Solusi: hapus keepalive, biarkan browser follow redirect otomatis
      const payload = JSON.stringify({
        resi    : item.resi,
        mode    : MODE,
        tsScan  : new Date(item.ts).toISOString(),
        tglScan : new Date(item.ts).toLocaleDateString("id-ID"),
        jamScan : new Date(item.ts).toLocaleTimeString("id-ID"),
        ua      : navigator.userAgent
      });
      const resp = await fetch(GAS_URL, {
        method   : "POST",
        body     : payload,
        headers  : { "Content-Type": "text/plain;charset=utf-8" },
        redirect : "follow"   // ikuti redirect 302 dari GAS
      });

      const pesan   = await resp.text();
      const isBatal = pesan.includes("🚫") || pesan.toLowerCase().includes("batal");
      const isDupli = pesan.includes("⚠️");

      // ── KOREKSI jika server bilang batal / duplikat ──
      // (Optimistic UI sudah anggap sukses — perlu koreksi counter)
      if (isBatal) {
        // Koreksi: kurangi sukses, tambah batal
        if (!resiBatalUnik.has(item.resi)) {
          cntSukses = Math.max(0, cntSukses - 1);
          resiBatalUnik.add(item.resi);
          cntBatal = resiBatalUnik.size;
          tampilStats();
          // Update tampilan item di riwayat
          updateRiwayatItem(item.resi, "batal", pesan);
          showToast("🚫 " + item.resi + " ternyata BATAL! Sudah dikoreksi.");
          bunyi("batal");
        }
      } else if (isDupli) {
        // Koreksi: kurangi sukses, tambah duplikat
        cntSukses = Math.max(0, cntSukses - 1);
        cntDuplikat++;
        tampilStats();
        updateRiwayatItem(item.resi, "duplikat", pesan);
        // Tidak perlu toast — duplikat normal saja
      }
      // Jika server sukses → tidak perlu koreksi apapun (sudah benar dari optimistic)
      return true;

    } catch(e) {
      // Network error — akan retry otomatis lewat runQueue
      return false;
    }
  }

  // ─────────────────────────────────────────────
  // TOAST
  // ─────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 5000);
  }

  // ─────────────────────────────────────────────
  // LOGIN
  // ─────────────────────────────────────────────
  function cekPassword() {
    if (document.getElementById("input-password").value === PASSWORD) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      inisialisasiAudio();
      initDB().then(initRiwayat);
      // Warmup ulang setelah login agar GAS warm saat scan pertama
      setTimeout(() => fetch(GAS_URL + "?ping=1").catch(() => {}), 500);
    } else {
      document.getElementById("login-error").textContent = "❌ Password salah.";
      document.getElementById("input-password").value = "";
    }
  }

  // ─────────────────────────────────────────────
  // STATUS BOX
  // ─────────────────────────────────────────────
  const statusDiv = document.getElementById("status");
  let resetTimer = null;
  function setStatus(pesan, kelas) {
    statusDiv.innerHTML = pesan;
    statusDiv.className = "status-box " + (kelas || "");
    clearTimeout(resetTimer);
    if (kelas) resetTimer = setTimeout(() => {
      statusDiv.className = "status-box";
      statusDiv.innerHTML = "Siap scan berikutnya…";
    }, 2000);
  }

  // ─────────────────────────────────────────────
  // RIWAYAT DOM
  // ─────────────────────────────────────────────
  // Simpan referensi DOM item per resi untuk koreksi
  const itemElMap = new Map(); // resi -> element

  function tambahRiwayatDOM(resi, status, ts) {
    const div = document.getElementById("riwayat");
    const el  = document.createElement("div");
    el.className = "item " + (status === "batal" ? "batal" : status === "duplikat" ? "duplikat" : "");
    const icon = status === "sukses" ? "✅" : status === "batal" ? "🚫" : "⚠️";
    const t = new Date(ts).toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    el.innerHTML = `<span class="item-icon">${icon}</span><span class="item-resi">${resi}</span><span class="item-time">${t}</span>`;
    div.insertBefore(el, div.firstChild);
    while (div.children.length > 30) div.removeChild(div.lastChild);
    // Simpan referensi untuk koreksi nanti
    itemElMap.set(resi, el);
  }

  function updateRiwayatItem(resi, statusBaru, pesan) {
    const el = itemElMap.get(resi);
    if (!el) return;
    const icon = statusBaru === "batal" ? "🚫" : "⚠️";
    el.className = "item " + statusBaru;
    const resiSpan = el.querySelector(".item-resi");
    const iconSpan = el.querySelector(".item-icon");
    if (iconSpan) iconSpan.textContent = icon;
    if (resiSpan) resiSpan.textContent = resi;
  }

  async function clearRiwayat() {
    if (!confirm("Hapus semua riwayat? Data di Google Sheets tetap aman.")) return;
    await dbClear();
    cntSukses = 0; cntBatal = 0; cntDuplikat = 0; resiBatalUnik.clear(); itemElMap.clear();
    tampilStats();
    document.getElementById("riwayat").innerHTML = "";
  }

  // ─────────────────────────────────────────────
  // SCANNER
  // ─────────────────────────────────────────────
  let codeReader = null, scanning = false, resiTerakhir = "", waktuTerakhir = 0;

  // Set resi yang sudah di-scan di sesi ini (dedup lokal sebelum nanya server)
  const resiDiprosesLokal = new Set();

  function mulaiScan() {
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    setStatus("⏳ Kamera aktif…", "proses");
    document.getElementById("btn-mulai").style.display = "none";
    document.getElementById("btn-stop").style.display  = "inline-flex";
    document.getElementById("scan-line").style.display = "block";
    document.getElementById("scanner-idle").style.display = "none";
    scanning = true;

    codeReader = new ZXing.BrowserMultiFormatReader();
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.QR_CODE
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    codeReader.hints = hints;

    codeReader.decodeFromConstraints({
      video: { facingMode:{ideal:"environment"}, width:{ideal:640}, height:{ideal:480}, frameRate:{ideal:30} }
    }, "video", (result, err) => {
      if (!result || !scanning) return;
      const resi = result.getText().trim().toUpperCase();
      const now  = Date.now();
      // Debounce: abaikan scan sama dalam 3 detik
      if (resi === resiTerakhir && now - waktuTerakhir < 3000) return;
      resiTerakhir = resi; waktuTerakhir = now;
      prosesHasil(resi, now);
    });
  }

  // ─────────────────────────────────────────────
  // PROSES HASIL — OPTIMISTIC UI
  //
  // Alur:
  // 1. Tampilkan sukses LANGSUNG (tanpa tunggu server)
  // 2. Bunyikan bunyi sukses LANGSUNG
  // 3. Masukkan ke queue → kirim ke GAS di background
  // 4. Jika server balas batal/duplikat → koreksi counter & tampilan
  //
  // Efek untuk operator: TIDAK ADA TUNGGU sama sekali
  // ─────────────────────────────────────────────
  function prosesHasil(resi, ts) {
    // Cek dedup lokal — resi yang sama di sesi ini
    // (server tetap dicek untuk memastikan, tapi UI langsung tampil)
    if (resiDiprosesLokal.has(resi)) {
      // Sudah pernah scan di sesi ini → tampil duplikat langsung
      bunyi("duplikat");
      setStatus("⚠️ <b>" + resi + "</b> sudah di-scan!", "duplikat");
      cntDuplikat++;
      tampilStats();
      tambahRiwayatDOM(resi, "duplikat", ts);
      dbWrite({ resi, status:"duplikat", ts, mode:MODE });
      // Tetap kirim ke server untuk dicatat di log
      enqueueScan({ resi, ts });
      return;
    }

    // ── OPTIMISTIC: Anggap sukses dulu ──
    resiDiprosesLokal.add(resi);
    bunyi("sukses");   // bunyi sukses LANGSUNG
    setStatus("✅ <b>" + resi + "</b> berhasil!", "sukses");
    cntSukses++;
    tampilStats();
    tambahRiwayatDOM(resi, "sukses", ts);
    dbWrite({ resi, status:"sukses", ts, mode:MODE });

    // ── Kirim ke server di background (tidak blok UI) ──
    enqueueScan({ resi, ts });
  }

  function stopScan() {
    scanning = false;
    if (codeReader) { codeReader.reset(); codeReader = null; }
    document.getElementById("scan-line").style.display  = "none";
    document.getElementById("btn-mulai").style.display  = "inline-flex";
    document.getElementById("btn-stop").style.display   = "none";
    document.getElementById("scanner-idle").style.display = "flex";
    setStatus("⏹ Dihentikan.");
  }

  function showResetModal() { document.getElementById("modal-reset").classList.add("open"); }
  function hideResetModal() { document.getElementById("modal-reset").classList.remove("open"); }
  async function resetSemua() {
    await dbClear();
    cntSukses = 0; cntBatal = 0; cntDuplikat = 0;
    resiBatalUnik.clear(); itemElMap.clear(); resiDiprosesLokal.clear();
    tampilStats();
    document.getElementById("riwayat").innerHTML = "";
    hideResetModal();
  }

  // ─────────────────────────────────────────────
  // PWA
  // ─────────────────────────────────────────────
  const mf = {name:"Scan Packing",short_name:"Packing",start_url:"./scan-packing.html",display:"standalone",background_color:"#0f0f1a",theme_color:"#1a1a2e",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>",sizes:"any",type:"image/svg+xml"}]};
  document.getElementById("manifest-link").href = URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:"application/json"}));
  if ("serviceWorker" in navigator) {
    const sw = `const C="sp-v4";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll([location.href]))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
  }
</script>
</body>
</html>
